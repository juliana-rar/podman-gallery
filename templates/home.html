{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
{% endblock extra_css %}

{% block content %}

<a class="home-logo" href="{% url 'blog:home' %}" aria-label="Inicio">
    <img src="{% if site_settings.home_logo %}{{ site_settings.home_logo.url }}{% else %}{% static 'dessign/logo.jpeg' %}{% endif %}" alt="{{ site_settings.site_title|default:'Logo' }}">
</a>

{% include 'components/herophotos.html' %}

{% if site_settings.hero_text %}
<section class="hero-desc">
    <div class="hero-desc-text">{{ site_settings.hero_text|linebreaks }}</div>
</section>
{% endif %}

{% endblock content %}
