{%load static%}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/components/blogcategories.css' %}">

<div class="cat-block">
    <p class="cat-block-label">Colecciones</p>
    <div class="blogcategories-grid">
        <div>
            <div>
                {% for category in categories %}
                <a href="{% url 'blog:category_blogs' category.slug %}">{{category.title}}</a>
                {% empty %}
                <p class="cat-empty">Aún no hay colecciones.</p>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
