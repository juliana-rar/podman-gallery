{% load static %}
    {% block extra_css %}
        <link rel="stylesheet" href="{% static 'css/projects/home_component3.css' %}">
    {% endblock extra_css %}

<section class="email-signup">
    <div>
        <h2>Compartir idea</h2>
        <p>Completa el formulario para que podamos ver tu idea</p>
        <div class="form-container">
            <input type="text" id="titulo" placeholder="Título" required>
            <textarea type="text" id="categoria" placeholder="Descripción de tu idea" required></textarea>  
            <button id="agregar-btn">Compartir idea</button>
        </div>
    </div>
</section>

<script>
    function getCsrfToken() {
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        return getCookie('csrftoken');
    }

    // Cargar proyectos al inicio
    function cargarProyectos() {
        fetch('/api/proyectos/')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Error al cargar: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                const lista = document.getElementById('proyectos-lista');
                lista.innerHTML = ''; // Limpiar contenido anterior

                if (!data || data.length === 0) {
                    lista.innerHTML = '<tr><td colspan="2">No hay proyectos aún</td></tr>';
                    return;
                }

                data.forEach(p => {
                    const row = lista.insertRow();
                    row.insertCell(0).textContent = p.titulo || 'Sin título';
                    row.insertCell(1).textContent = p.categoria || 'Sin categoría';
                });
            })
            .catch(err => {
                const lista = document.getElementById('proyectos-lista');
                lista.innerHTML = '<tr><td colspan="2">Error al cargar proyectos 😢</td></tr>';
                console.error('Error al cargar proyectos:', err);
            });
    }

document.getElementById('agregar-btn').addEventListener('click', async function() {
    const tituloInput = document.getElementById('titulo');
    const categoriaInput = document.getElementById('categoria');  

    const titulo = tituloInput.value.trim();
    const descripcion = categoriaInput.value.trim();  

    if (!titulo || !descripcion) {
        alert('Por favor, completa el título y la descripción de la idea.');
        return;
    }

    const csrfToken = getCsrfToken();
    if (!csrfToken) {
        alert('Error de seguridad: token CSRF no encontrado');
        return;
    }

    const proyecto = {
        titulo: titulo,
        categoria: descripcion   
    };

    const btn = this;
    btn.disabled = true;
    btn.textContent = 'Procesando...';

    try {
        const response = await fetch('/api/proyectos/', {
            method: 'POST',
            credentials: 'same-origin',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken,
            },
            body: JSON.stringify(proyecto)
        });

        if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.detail || 'Error al guardar la idea');
        }

        const data = await response.json();
        
        window.location.href = `/ideas/mejorar/${data.id}/`;

    } catch (error) {
        console.error('Error:', error);
        alert('No se pudo compartir la idea:\n' + error.message);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Compartir idea';
    }
});
    window.addEventListener('DOMContentLoaded', cargarProyectos);
</script>
