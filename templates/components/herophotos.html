{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/components/herophotos.css' %}">

<section class="herophotos" id="heroPhotos">
    <video class="hp-video" autoplay muted loop playsinline preload="auto">
        <source src="{% if site_settings.hero_video %}{{ site_settings.hero_video.url }}{% else %}{% static 'dessign/exilium-video.mp4' %}{% endif %}" type="video/mp4">
    </video>
    <div class="hp-overlay"></div>
</section>
