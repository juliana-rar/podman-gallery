{% load static %}
<article class="ev-piece">
    <a href="{% url 'products:product_details' product.slug %}">
        <div class="ev-media">
            {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.title }}" loading="lazy">
            {% else %}
                <img src="{% static 'images/placeholder-event.jpg' %}" alt="{{ product.title }}" loading="lazy">
            {% endif %}
            <span class="ev-overlay">
                <h4 data-es="{{ product.title }}" data-en="{{ product.title_en|default:product.title }}">{{ product.title_en|default:product.title }}</h4>
            </span>
        </div>
    </a>
</article>
