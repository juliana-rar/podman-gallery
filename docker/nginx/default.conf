# Reverse proxy de produccion para sigfrid.
# nginx sirve los archivos estaticos y de media directamente (rapido),
# y reenvia el resto de peticiones a gunicorn (servicio "web").
upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Permitir subidas (imagenes de CKEditor, etc.)
    client_max_body_size 25M;

    # Estaticos recolectados por "collectstatic" (volumen compartido con web)
    location /static/ {
        alias /vol/static/;
        access_log off;
        expires 30d;
    }

    # Archivos subidos por usuarios (volumen compartido con web)
    location /media/ {
        alias /vol/media/;
        access_log off;
        expires 30d;
    }

    # Todo lo demas va a la app Django via gunicorn
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
