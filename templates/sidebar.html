<div class="sidebar-container">
    <div>
        <div>
            <form action="{% url 'blog:search_blogs' %}" method="GET">
                <input class="search-input" name="search" type="text" placeholder="Buscar..." required>
                <button class="search-button">Buscar</button>
            </form>
        </div>
        <div class="sidebar-item recent-posts">
            <div class="sidebar-heading">
                <h2>Posts recientes</h2>
            </div>
            <div class="content">
                <ul>
                    {% for blog in blogs|slice:"3"%}
                    <li>
                        <a href="{% url 'blog:blog_details' blog.slug %}">
                            <h5>{{blog.title}}</h5>
                            <span>{{blog.created_date}}</span>
                        </a>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
        <div class="sidebar-item categories">
            <div class="sidebar-heading">
                <h2>Categorias</h2>
            </div>
            <div class="content">
                <ul>
                    {% for category in categories %}
                    <li><a href="{% url 'blog:category_blogs' category.slug %}">- {{category.title}}</a></li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</div>
